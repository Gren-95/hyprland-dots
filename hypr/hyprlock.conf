# BACKGROUND
background {
    monitor =
    path = ~/Pictures/wallpapers/Dark_Nature_blurred.png
    blur_passes = 2
    contrast = 0.89
    brightness = 0.82
    vibrancy = 0.17
}

general {
    hide_cursor = false
    grace = 0
}

# Day
label {
    monitor =
    text = cmd[update:1000] date +"%A"
    color = rgba(245, 245, 244, 0.80)
    font_size = 90
    font_family = FiraCode Nerd Font Bold
    position = 0, 350
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
}

# Date
label {
    monitor =
    text = cmd[update:1000] date +"%d %B"
    color = rgba(245, 245, 244, 0.70)
    font_size = 40
    font_family = FiraCode Nerd Font Bold
    position = 0, 250
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
}

# Time
label {
    monitor =
    text = cmd[update:1000] date +"- %H:%M -"
    color = rgba(51, 204, 255, 0.80)
    font_size = 20
    font_family = FiraCode Nerd Font Bold
    position = 0, 195
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
}

# Profile picture
image {
    monitor =
    path = ~/.config/hypr/avatar.png
    border_size = 2
    border_color = rgba(51, 204, 255, 0.8)
    size = 120
    rounding = -1
    position = 0, 40
    halign = center
    valign = center
}

# User box
shape {
    monitor =
    size = 300, 58
    color = rgba(28, 25, 23, 0.55)
    rounding = -1
    border_size = 1
    border_color = rgba(68, 64, 60, 0.5)
    position = 0, -130
    halign = center
    valign = center
}

# Username
label {
    monitor =
    text =  $USER
    color = rgba(245, 245, 244, 0.90)
    font_size = 18
    font_family = FiraCode Nerd Font Bold
    position = 0, -130
    halign = center
    valign = center
}

# Input field
input-field {
    monitor =
    size = 300, 58
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(51, 204, 255, 0.0)
    inner_color = rgba(28, 25, 23, 0.55)
    font_color = rgba(245, 245, 244, 1.0)
    fade_on_empty = false
    font_family = FiraCode Nerd Font
    placeholder_text = <i><span foreground="##78716c"> enter password</span></i>
    check_color = rgba(51, 204, 255, 1.0)
    fail_color = rgba(239, 68, 68, 1.0)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    capslock_color = rgba(234, 179, 8, 1.0)
    hide_input = false
    position = 0, -210
    halign = center
    valign = center
}

# Suspend
label {
    monitor =
    text = Suspend
    color = rgba(245, 245, 244, 0.55)
    font_size = 16
    font_family = FiraCode Nerd Font
    onclick = systemctl suspend
    position = -120, 200
    halign = center
    valign = bottom
}

# Reboot
label {
    monitor =
    text = Reboot
    color = rgba(245, 245, 244, 0.55)
    font_size = 16
    font_family = FiraCode Nerd Font
    onclick = reboot now
    position = 0, 200
    halign = center
    valign = bottom
}

# Shutdown
label {
    monitor =
    text = Shutdown
    color = rgba(239, 68, 68, 0.70)
    font_size = 16
    font_family = FiraCode Nerd Font
    onclick = shutdown now
    position = 120, 200
    halign = center
    valign = bottom
}
