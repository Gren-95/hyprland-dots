general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    path = ~/Pictures/wallpapers/Dark_Nature_blurred.png
    blur_passes = 3
    blur_size = 7
    brightness = 0.6
    contrast = 1.0
    vibrancy = 0.2
}

# Clock - time
label {
    monitor =
    text = $TIME
    color = rgba(245, 245, 244, 1.0)
    font_size = 88
    font_family = FiraCode Nerd Font Bold
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
}

# Clock - date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(120, 113, 108, 1.0)
    font_size = 14
    font_family = FiraCode Nerd Font
    position = 0, 130
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
}

# Password input
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(68, 64, 60, 0.8)
    inner_color = rgba(28, 25, 23, 0.8)
    font_color = rgba(245, 245, 244, 1.0)
    fade_on_empty = true
    placeholder_text = <span foreground="##78716c">enter password...</span>
    check_color = rgba(51, 204, 255, 1.0)
    fail_color = rgba(239, 68, 68, 1.0)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgba(234, 179, 8, 1.0)
    position = 0, -60
    halign = center
    valign = center
}
