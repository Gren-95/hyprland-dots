# Hypridle configuration - improved for clarity, maintainability, and efficiency

general {
    # Prevent multiple hyprlock instances
    lock_cmd = pidof hyprlock || (bash ~/.config/scripts/hyprlock-art.sh; hyprlock)

    # Fetch art and lock before suspend
    before_sleep_cmd = bash ~/.config/scripts/hyprlock-art.sh && loginctl lock-session

    # Ensure display wakes up immediately after sleep.
    # A DPMS off->on toggle CANNOT clear a stuck i915 atomic page-flip ("Cannot
    # commit when a page-flip is awaiting") left over from suspend - aquamarine
    # refuses every commit and the panel stays frozen/black behind hyprlock.
    # Only a DRM-master handoff fixes it, which is exactly what a VT switch does
    # (the manual ctrl+alt+f3 -> f2 recovery). So: re-assert the panel as enabled,
    # set DPMS on for logical state, then cycle VT3->VT2 to force aquamarine to
    # release and re-acquire DRM master, producing a clean modeset.
    # Requires: sudo setcap cap_sys_tty_config+ep /usr/bin/chvt  (so chvt needs no root).
    after_sleep_cmd = hyprctl keyword monitor "eDP-1, preferred, 0x0, 1"; hyprctl dispatch dpms on eDP-1; sleep 0.2; chvt 3; sleep 0.5; chvt 2; brightnessctl -r
}

# Dim screen after 2.5 minutes of inactivity
listener {
    timeout = 150
    on-timeout = brightnessctl -s set 10      # Set monitor backlight to minimum (avoid 0 for OLED)
    on-resume = brightnessctl -r              # Restore monitor backlight
}

# Keyboard backlight off after 2.5 minutes (optional, comment if not needed)
listener {
    timeout = 150
    on-timeout = brightnessctl -sd rgb:kbd_backlight set 0
    on-resume = brightnessctl -rd rgb:kbd_backlight
}

# Lock screen after 5 minutes of inactivity
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Turn off display after 8 minutes of inactivity, restore on activity
# on-resume toggles dpms off/on to force a fresh KMS modeset and recover from
# stuck i915 atomic page-flips that leave the panel black after DPMS wake
listener {
    timeout = 480
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on && sleep 0.2 && hyprctl dispatch dpms off && hyprctl dispatch dpms on && brightnessctl -r
}

# Suspend system after 15 minutes of inactivity
listener {
    timeout = 900
    on-timeout = systemctl suspend
}
