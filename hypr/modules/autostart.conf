env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24
env = QT_QPA_PLATFORMTHEME,hyprqt6engine
env = QML_IMPORT_PATH, /home/ghost/.local/lib64/qt6/qml

exec-once = bash ~/.config/scripts/restart.sh
exec-once = nm-applet --indicator
# Immich + Jellyfin sync are scheduled via cron, toggleable from Quick Actions.
# See scripts/sync-toggle.sh.
