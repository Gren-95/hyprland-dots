env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24
env = QT_QPA_PLATFORMTHEME,hyprqt6engine

exec-once = systemctl --user start hyprpolkitagent
exec-once = bash ~/.config/scripts/restart.sh
exec-once = nm-applet --indicator
exec-once = bash -c 'command -v immich >/dev/null 2>&1 || [[ -x ~/.npm-global/bin/immich ]] && exec bash ~/.config/scripts/immich-sync.sh'
exec-once = bash -c '[[ -f ~/.config/jellyfin/sync.conf ]] && exec bash ~/.config/scripts/jellyfin-music-sync.sh --daemon'
