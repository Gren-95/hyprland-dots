# ranger configuration.

# ===== Previews =====
set preview_images true
set preview_images_method kitty
set preview_directories true
set preview_files true

# ===== Git status next to each tracked file =====
set vcs_aware true
set vcs_backend_git enabled

# ===== Layout =====
set draw_borders separators
set column_ratios 1,3,4
set scroll_offset 8
set wrap_scroll false
set status_bar_on_top false

# ===== Defaults =====
set show_hidden false           # toggle with `zh`
set confirm_on_delete multiple  # only confirm when deleting >1
set autosave_bookmarks true

# ===== Devicons (plugin: alexanderjeurissen/ranger_devicons, installed
#       by setup.sh into ~/.config/ranger/plugins/ranger_devicons) =====
default_linemode devicons
